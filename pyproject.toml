[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "netshaper"
version = "3.8.0"
description = "A safety-first, authorized network shaping and diagnostics toolkit for controlled lab testing"
readme = "README.md"
requires-python = ">=3.10"
authors = [{name = "NetShaper Contributors"}]
license = "MIT"
classifiers = [
  "Programming Language :: Python :: 3",
  "Environment :: Console",
  "Topic :: Security",
]
dependencies = [
  "psutil>=5.9",
  "scapy>=2.5",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
netshaper = "netshaper.ui.cli:main"
netshaper-fake-server = "netshaper.fake_server3:main"

[tool.setuptools]
include-package-data = true
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["netshaper", "netshaper.*"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
