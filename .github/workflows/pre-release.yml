name: Pre-Release Privileged Tests

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

# Prevent multiple runs of this workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-privileged-tests:
    name: Require Privileged Test Clearance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run standard test suite
        run: |
          pytest tests/ -v --tb=short --cov=src/netshaper --cov-report=term

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=80

      - name: Run static analysis
        run: |
          mypy src/netshaper/
          ruff check src/netshaper/
          bandit -r src/netshaper/ -ll

      - name: Privileged Test Clearance
        run: |
          echo "To merge to main, the following must be completed:"
          echo "1. Run privileged network namespace tests on self-hosted runner"
          echo "2. Verify no regressions in traffic shaping"
          echo "3. Test stale session recovery"
          echo ""
          echo "Run this locally before merge:"
          echo "  sudo pytest tests/test_netns_integration.py -v"
          echo ""
          echo "If you are a maintainer and have verified these:"
          echo "  Set label: 'privileged-tests-passed'"
