name: Pre-Release Privileged Tests

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

# Prevent multiple runs of this workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-privileged-tests:
    name: Require Privileged Test Clearance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run standard test suite
        run: |
          pytest tests/ -v --tb=short --cov=src/netshaper --cov-report=term

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=80

      - name: Run static analysis
        run: |
          mypy src/netshaper/
          ruff check src/netshaper/
          bandit -r src/netshaper/ -ll

      - name: Require privileged-test label
        uses: actions/github-script@v6
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map(l => l.name)
            if (!labels.includes('privileged-tests-passed')) {
              core.setFailed("Missing required label: privileged-tests-passed. Run privileged tests on an approved runner and add the label to proceed.")
            } else {
              core.info('privileged-tests-passed label present; merge clearance granted')
            }
