name: Pre-Release Privileged Tests

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

# Prevent multiple runs of this workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  check-privileged-tests:
    name: Require Privileged Test Clearance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Invalidate stale privileged label on PR sync
        if: github.event.action == 'synchronize'
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: context.issue.number,
            })
            const labels = (pullRequest.labels || []).map(label => label.name)
            if (labels.includes('privileged-tests-passed')) {
              try {
                await github.rest.issues.removeLabel({
                  ...context.repo,
                  issue_number: context.issue.number,
                  name: 'privileged-tests-passed',
                })
                core.info('Removed stale privileged-tests-passed label on PR sync')
              } catch (error) {
                if (error.status !== 404) {
                  throw error
                }
              }
            }

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run standard test suite
        run: |
          pytest tests/ -v --tb=short --cov=src/netshaper --cov-report=term

      - name: Check coverage threshold
        run: |
          coverage report
          coverage report \
            --include="src/netshaper/core/authorization.py,src/netshaper/core/firewall_manager.py,src/netshaper/core/mitm_manager.py,src/netshaper/core/plugin.py,src/netshaper/core/plugin_loader.py,src/netshaper/core/recovery_manager.py,src/netshaper/core/state_manager.py,src/netshaper/network/firewall.py,src/netshaper/network/shaper.py" \
            --fail-under=80

      - name: Run static analysis
        run: |
          mypy src/netshaper/
          ruff check src/netshaper/
          bandit -r src/netshaper/ -ll

      - name: Require privileged-test label
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: context.issue.number,
            })
            const labels = (pullRequest.labels || []).map(label => label.name)
            if (!labels.includes('privileged-tests-passed')) {
              core.setFailed("Missing required label: privileged-tests-passed. Run privileged tests on an approved runner and add the label to proceed.")
            } else {
              core.info('privileged-tests-passed label present; merge clearance granted')
            }
